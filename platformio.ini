; ============================================================
; platformio.ini — Cerradura Kaizen para M5Dial
; Migración desde ESP32 genérico + MFRC522 SPI
; Destino: M5Dial (M5StampS3 + WS1850S I2C + GC9A01 TFT + BM8563 RTC)
; ============================================================
[env:m5dial]
platform  = espressif32
board     = m5stack-stamps3          ; M5StampS3 es el MCU interno del M5Dial
framework = arduino

; ─────────────────────────────────────────────────────────────
; Velocidad de subida y monitor serie (sólo para depuración)
; ─────────────────────────────────────────────────────────────
upload_speed   = 921600
upload_protocol = esptool
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ─────────────────────────────────────────────────────────────
; Partición de flash con más espacio para OTA y NVS/EEPROM
; ─────────────────────────────────────────────────────────────
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; ─────────────────────────────────────────────────────────────
; Flags de compilación
;   - ARDUINO_USB_MODE=1  → habilita CDC USB nativo del S3
;   - LVGL_CONF_INCLUDE_SIMPLE → LVGL busca lv_conf.h en include/
; ─────────────────────────────────────────────────────────────
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLVGL_CONF_INCLUDE_SIMPLE
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=0           ; 0=Silencioso en producción, 5=Verbose depuración

; ─────────────────────────────────────────────────────────────
; Librerías
;   NOTA: NO se incluye MFRC522 ni ninguna librería SPI-RFID.
;         El WS1850S del M5Dial se maneja directamente por I2C.
; ─────────────────────────────────────────────────────────────
lib_deps =
    ; ── Librería oficial M5Dial
    ;    Incluye TODO lo necesario para el hardware integrado:
    ;      · M5Dial.Rfid    → WS1850S (API MFRC522 via I2C, sin librería externa)
    ;      · M5Dial.Display → GC9A01 TFT 240×240
    ;      · M5Dial.Rtc     → BM8563 RTC
    ;      · M5Dial.Speaker → buzzer
    ;      · M5Dial.Encoder → encoder rotatorio
    m5stack/M5Dial @ ^1.0.2

    ; ── TFT_eSPI: usado por ui_display.h para primitivas gráficas avanzadas
    ;    (ya incluido como dependencia transitiva de M5Dial, se declara por claridad)
    bodmer/TFT_eSPI @ ^2.5.43

    ; ── EEPROM emulada — nativa del framework Arduino/ESP32, sin instalación

; ─────────────────────────────────────────────────────────────
; NOTA: NO se incluye ninguna librería MFRC522 externa.
;   M5Dial.Rfid ya proporciona la API MFRC522 internamente.
;   rfid_ws1850s.h tampoco se usa; el acceso al RFID es directo
;   a través de M5Dial.Rfid (objeto MFRC522 configurado por el BSP).
; ─────────────────────────────────────────────────────────────

; ─────────────────────────────────────────────────────────────
; Rutas de cabeceras propias del proyecto
; ─────────────────────────────────────────────────────────────
build_src_filter =
    +<*>
    -<.git/>

; ─────────────────────────────────────────────────────────────
; Script de pre-compilación: elimina archivos de metadatos macOS
; (._*) que se cuelan en algunos tarballs de librerías y rompen GCC
; ─────────────────────────────────────────────────────────────
extra_scripts = pre:remove_macos_files.py

; ─────────────────────────────────────────────────────────────
; Puerto serie (ajustar según el COM asignado por Windows)
; ─────────────────────────────────────────────────────────────
; upload_port = COM3
; monitor_port = COM3
